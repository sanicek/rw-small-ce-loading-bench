# Exact output contracts are tracked here; reusable source artwork remains in
# rw-art-pipeline's versioned template catalog.
[project]
package_id = "Sanicek.SmallCELoadingBench"
name = "Small CE Loading Bench"
root = ".."

[[requests]]
id = "mod-icon"
title = "Sanicek S mod icon"
width = 256
height = 256
occupied_fraction = 1.0
alpha_required = true
background_removal = "none"
fit = "contain"
output_mode = "RGBA"
accent_saturation_min = 0.0
outputs = [
  { path = "About/ModIcon.png" },
]
prompt = """
Use rw-art's provider-independent sanicek-s-logo template, rimworld-mod-icon
variant, as the exact Small CE Loading Bench mod icon. Preserve its transparent
background and canonical bytes rather than regenerating or recomposing it.
"""
